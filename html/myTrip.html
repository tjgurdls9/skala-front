<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>나의 여행지</title>
    <style>
        body {
            font-family: 'Apple SD Gothic Neo', 'Malgun Gothic', sans-serif;
            color: #333333;
            max-width: 500px;
            margin: 20px auto;
            line-height: 1.6;
            border: 1px solid #e0e0e0;
            padding: 20px;
            box-sizing: border-box;
        }
        
        h1 { font-size: 20px; margin-bottom: 10px; }
        h2 { font-size: 18px; margin-top: 30px; margin-bottom: 10px; }
        
        img, video, audio {
            width: 100%;
            background-color: #f0f0f0; 
            border-radius: 4px;
            display: block;
        }
        
        img { min-height: 200px; object-fit: cover; }
        video { min-height: 280px; }
        
        .media-item {
            margin-bottom: 25px;
            border-bottom: 1px solid #eee;
            padding-bottom: 15px;
        }
        .caption {
            font-size: 12px;
            color: #555;
            margin-top: 8px;
        }
    </style>
</head>
<body>
    <h1>🌍 나의 여행 앨범 🎵</h1>
    <div class="media-item" style="border-bottom: none;">
        <audio controls>
            <source src="../media/bgm.mp3" type="audio/mpeg">
            브라우저가 오디오 태그를 지원하지 않습니다.
        </audio>
    </div>

    <div class="media-item">
        <img src="../media/lijiang.jpg" alt="리장 호도협 사진 영역">
        <p class="caption">리장 호도협 (2025년)</p>
    </div>

    <div class="media-item">
        <img src="../media/cebu.jpg" alt="세부 탑스힐 사진 영역">
        <p class="caption">세부 탑스힐 (2024년)</p>
    </div>

    <div class="media-item">
        <img src="../media/hokkaido.jpg" alt="홋카이도 대설산 사진 영역">
        <p class="caption">홋카이도 대설산 (2025년)</p>
    </div>

    <h2>📽️ 나의 여행 브이로그</h2>
    <div class="media-item" style="border-bottom: none; margin-bottom: 0;">
        <video controls>
            <source src="../media/vlog.mp4" type="video/mp4">
            브라우저가 비디오 태그를 지원하지 않습니다.
        </video>
        <p class="caption">리장의 아름다운 음악 ✈️</p>
    </div>
</body>
</html>

<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>회원가입 결과</title>
    <link rel="stylesheet" href="../css/style.css">
</head>
<body>
    <!-- 전체를 감싸는 중앙 정렬 컨테이너 -->
    <div class="container">
        
        <!-- 하얀색 둥근 배경 박스 (Card) -->
        <div class="card">
            
            <!-- 1. 축하 메시지 영역 -->
            <h1>🎉 회원가입을 진심으로 축하합니다!</h1>
            <p style="font-size: 14px; color: #555;">서혁인의 유니버스 회원이 되신 것을 환영합니다.</p>
            
            <hr style="border: 0; border-top: 1px solid #ccc; margin: 20px 0;">

            <!-- 2. 안내 사항 영역 -->
            <h3>안내 사항</h3>
            <ul>
                <li>입력하신 이메일 주소로 가입 확인 메일이 발송되었습니다.</li>
                <li>보안을 위해 첫 로그인 후 비밀번호를 다시 한번 확인해 주세요.</li>
                <li>작성하신 프로필 정보는 마이페이지에서 언제든지 수정이 가능합니다.</li>
            </ul>
            
            <hr style="border: 0; border-top: 1px solid #ccc; margin: 20px 0;">
            
            <!-- 3. 바로가기 링크 영역 -->
            <h3>이동하기</h3>
            <p style="font-size: 14px; color: #555;">아래 링크를 클릭하면 이전에 작성한 다른 페이지로 이동할 수 있습니다.</p>
            
            <ul class="link-list">
                <li><a href="myClass.html">🏛️ 나의 수업 (myClass)</a></li>
                <li><a href="myHoliday.html">🏄 나의 휴일 (myHoliday)</a></li>
                <li><a href="myProfile.html">👤 나의 프로필 (myProfile)</a></li>
            </ul>

            <hr style="border: 0; border-top: 1px solid #ccc; margin: 30px 0;">
            
        </div>
        
    </div>
</body>
</html>

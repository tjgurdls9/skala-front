<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>회원가입</title>
    <style>
        body {
            font-family: 'Apple SD Gothic Neo', 'Malgun Gothic', sans-serif;
            color: #333333;
            max-width: 600px;
            margin: 20px auto;
            line-height: 1.6;
        }
        h2 { color: #2c1a60; margin-bottom: 5px; }
        fieldset {
            border: 1px solid #e0e0e0;
            margin-bottom: 20px;
            padding: 15px;
            border-radius: 5px;
        }
        legend { font-weight: bold; color: #555555; }
        .form-group { margin-bottom: 15px; }
        label.title {
            display: inline-block;
            width: 100px;
            font-size: 14px;
            font-weight: 600;
        }
        input[type="text"], input[type="password"], input[type="date"], select, textarea {
            padding: 5px;
            border: 1px solid #cccccc;
            border-radius: 3px;
        }
        textarea {
            width: 100%;
            height: 80px;
            box-sizing: border-box;
            margin-top: 5px;
        }
        .required { font-size: 12px; color: #777777; }
        .button-group { text-align: center; margin-top: 20px; }
    </style>
</head>
<body>
    <h2>👤 회원가입</h2>
    <p style="font-size: 14px; color: #555;">SKALA-FRONT 회원가입을 환영합니다.</p>
    <hr style="border: 0; border-top: 1px solid #ddd; margin-bottom: 20px;">

    <form action="signUpResult.html" method="get">
        
        <fieldset>
            <legend>계정 정보</legend>
            <div class="form-group">
                <label for="userId" class="title">아이디:</label>
                <input type="text" id="userId" name="userId" placeholder="4~15자 영문/숫자" required>
                <span class="required">(필수)</span>
            </div>
            <div class="form-group">
                <label for="userPw" class="title">비밀번호:</label>
                <input type="password" id="userPw" name="userPw" placeholder="8자 이상 입력" required>
                <span class="required">(필수)</span>
            </div>
            <div class="form-group">
                <label for="emailId" class="title">이메일:</label>
                <input type="text" id="emailId" name="emailId" placeholder="example"> @
                <select name="emailDomain" id="emailDomain">
                    <option value="direct">직접 입력</option>
                    <option value="naver.com">naver.com</option>
                    <option value="gmail.com">gmail.com</option>
                </select>
            </div>
        </fieldset>

        <fieldset>
            <legend>개인 프로필 정보</legend>
            <div class="form-group">
                <label for="userName" class="title">이름:</label>
                <input type="text" id="userName" name="userName">
            </div>
            <div class="form-group">
                <label for="birthDate" class="title">생년월일:</label>
                <input type="date" id="birthDate" name="birthDate">
            </div>
            <div class="form-group">
                <label class="title">성별:</label>
                <label><input type="radio" name="gender" value="male" checked> 남성</label>
                <label><input type="radio" name="gender" value="female"> 여성</label>
                <label><input type="radio" name="gender" value="none"> 선택안함</label>
            </div>
            <div class="form-group">
                <label class="title" style="display: block; margin-bottom: 5px;">관심 분야 (중복 선택 가능):</label>
                <label><input type="checkbox" name="interest" value="frontend"> 웹 프론트엔드 (Vue.js/HTML)</label><br>
                <label><input type="checkbox" name="interest" value="uiux"> UI/UX 디자인 표준</label><br>
                <label><input type="checkbox" name="interest" value="backend"> 백엔드 & 데이터베이스</label><br>
                <label><input type="checkbox" name="interest" value="cloud"> 클라우드 & 인프라</label>
            </div>
            <div class="form-group">
                <label for="route" class="title">가입 경로:</label>
                <select id="route" name="route">
                    <option value="">-- 선택해 주세요 --</option>
                    <option value="search">검색</option>
                    <option value="ad">광고</option>
                    <option value="friend">지인 추천</option>
                </select>
            </div>
        </fieldset>

        <fieldset>
            <legend>자기소개</legend>
            <div class="form-group">
                <label for="intro" class="title" style="width: 100%;">나를 표현하는 한 줄 소개 또는 가입 인사:</label>
                <textarea id="intro" name="intro" placeholder="여기에 내용을 입력하세요 (최대 200자)"></textarea>
            </div>
        </fieldset>

        <div class="button-group">
            <button type="submit">동의하고 회원가입</button>
            <button type="reset">다시 작성</button>
        </div>
    </form>
</body>
</html>

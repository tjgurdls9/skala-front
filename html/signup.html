<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>회원가입</title>
    <link rel="stylesheet" href="../css/style.css">
</head>
<body>
    <!-- 전체를 감싸는 중앙 정렬 컨테이너 -->
    <div class="container">
        
        <h2>👤 회원가입</h2>
        <p style="font-size: 20px; color: #555;">SKALA-FRONT 회원가입을 환영합니다.</p>
        <hr style="border: 0; border-top: 1px solid #ddd; margin-bottom: 20px;">

        <!-- 회원가입 폼 시작 -->
        <form action="signUpResult.html" method="get">
            
            <!-- 1. 계정 정보 영역 -->
            <fieldset>
                <legend>계정 정보</legend>
                
                <div class="form-group">
                    <label for="userId" class="title">아이디:</label>
                    <input type="text" id="userId" name="userId" placeholder="4~15자리의 영문 대소문자와 숫자만 입력 가능합니다." required minlength="4" maxlength="15" pattern="^[a-zA-Z0-9]+$" title="4~15자리의 영문 대소문자와 숫자만 입력 가능합니다.">
                    <span class="required">(필수)</span>
                </div>
                
                <div class="form-group">
                    <label for="userPw" class="title">비밀번호:</label>
                    <input type="password" id="userPw" name="userPw" placeholder="8자 이상 입력" required minlength="8">
                    <span class="required">(필수)</span>
                </div>
                
                <div class="form-group email-group">
                    <label for="emailId" class="title">이메일:</label>
                    <div class="email-input-container">
                        <!-- 이메일 아이디 입력 필수 -->
                        <input type="text" id="emailId" name="emailId" placeholder="example" required>
                        <span>@</span>
                        <!-- 도메인 선택 필수 -->
                        <select name="emailDomain" id="emailDomain" required>
                            <option value="">-- 선택 --</option>
                            <option value="direct">직접 입력</option>
                            <option value="naver.com">naver.com</option>
                            <option value="gmail.com">gmail.com</option>
                        </select>
                    </div>    
                </div>
            </fieldset>

            <!-- 2. 개인 프로필 정보 영역 -->
            <fieldset>
                <legend>개인 프로필 정보</legend>
                
                <div class="form-group">
                    <label for="userName" class="title">이름:</label>
                    <input type="text" id="userName" name="userName" required>
                </div>
                
                <div class="form-group">
                    <label for="birthDate" class="title">생년월일:</label>
                    <input type="date" id="birthDate" name="birthDate" required>
                </div>
                
                <!-- 성별 (인라인 스타일로 레이아웃 강제 교정) -->
                <div class="form-group">
                    <label class="title" style="width: auto !important; margin-right: 15px !important;">성별:</label>
                    <label><input type="radio" name="gender" value="male" checked> 남성</label>
                    <label><input type="radio" name="gender" value="female"> 여성</label>
                    <label><input type="radio" name="gender" value="none"> 선택안함</label>
                </div>

                <!-- 관심 분야 -->
                <div class="form-group">
                    <label class="title" style="display: block !important; width: auto !important; margin-bottom: 5px !important;">관심 분야 (선택사항, 중복 선택 가능):</label>
                    <label><input type="checkbox" name="interest" value="frontend"> 웹 프론트엔드 (Vue.js/HTML)</label><br>
                    <label><input type="checkbox" name="interest" value="uiux"> UI/UX 디자인 표준</label><br>
                    <label><input type="checkbox" name="interest" value="backend"> 백엔드 & 데이터베이스</label><br>
                    <label><input type="checkbox" name="interest" value="cloud"> 클라우드 & 인프라</label>
                </div>
                
                <!-- 가입 경로 -->
                <div class="form-group">
                    <label for="route" class="title">가입 경로:</label>
                    <select id="route" name="route" required>
                        <option value="">-- 선택해 주세요 --</option>
                        <option value="search">검색</option>
                        <option value="ad">광고</option>
                        <option value="friend">지인 추천</option>
                    </select>
                </div>
            </fieldset>

            <!-- 3. 자기소개 영역 -->
            <fieldset>
                <legend>자기소개</legend>
                <div class="form-group">
                    <label for="intro" class="title" style="width: 100%;">나를 표현하는 한 줄 소개 또는 가입 인사:</label>
                    <textarea id="intro" name="intro" placeholder="여기에 내용을 입력하세요 (최대 200자)" required></textarea>
                </div>
            </fieldset>

            <!-- 4. 하단 버튼 영역 -->
            <div class="button-group">
                <button type="submit">동의하고 회원가입</button>
                <button type="reset">다시 작성</button>
            </div>
            
        </form>
    </div>
</body>
</html>
